<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitochi Games — Global Leaderboard</title>
<style>
  /* ── Reset & tokens ───────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080c10;
    --surface:   #0e1520;
    --surface2:  #131d2a;
    --border:    #1e2d40;
    --text:      #d6e4f0;
    --muted:     #4a6278;
    --accent:    #00d4ff;
    --accent2:   #7c3aed;
    --gold:      #fbbf24;
    --silver:    #94a3b8;
    --bronze:    #cd7c3a;
    --green:     #22c55e;
    --radius:    12px;
    --shadow:    0 8px 32px rgba(0,0,0,.6);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── Grid background ──────────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  /* ── Header ───────────────────────────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,12,16,.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center; gap: 16px;
    height: 60px;
  }

  .logo {
    font-size: 1.1rem; font-weight: 800; letter-spacing: .08em;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    white-space: nowrap;
  }

  header .sep { flex: 1; }

  .live-dot {
    display: flex; align-items: center; gap: 6px;
    font-size: .75rem; color: var(--muted); letter-spacing: .05em;
    text-transform: uppercase;
  }
  .live-dot::before {
    content: ''; width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Hero banner ──────────────────────────────────────────────────── */
  #hero {
    position: relative; width: 100%; height: clamp(180px, 36vw, 380px);
    overflow: hidden;
    background: var(--surface);
  }

  #hero-img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center;
    transition: opacity .4s, transform .6s cubic-bezier(.4,0,.2,1);
    opacity: 0; transform: scale(1.03);
  }
  #hero-img.loaded { opacity: 1; transform: scale(1); }

  #hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(8,12,16,.9) 0%, transparent 60%);
    display: flex; flex-direction: column;
    justify-content: flex-end; padding: 20px 28px;
    pointer-events: none;
  }

  #hero-game-name {
    font-size: clamp(1.6rem, 5vw, 3rem);
    font-weight: 900; letter-spacing: .04em; text-transform: uppercase;
    text-shadow: 0 0 30px var(--accent);
    color: #fff;
    transition: opacity .3s;
  }

  .hero-bottom {
    display: flex; align-items: center; gap: 14px; margin-top: 6px;
    flex-wrap: wrap;
  }

  #hero-tagline {
    font-size: .82rem; color: var(--accent); letter-spacing: .12em;
    text-transform: uppercase;
  }

  #ciq-link {
    pointer-events: all;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 14px; border-radius: 999px;
    background: rgba(0,212,255,.12);
    border: 1px solid rgba(0,212,255,.4);
    color: var(--accent); font-size: .75rem; font-weight: 700;
    letter-spacing: .06em; text-transform: uppercase;
    text-decoration: none;
    transition: background .2s, border-color .2s, box-shadow .2s;
  }
  #ciq-link:hover {
    background: rgba(0,212,255,.22);
    border-color: var(--accent);
    box-shadow: 0 0 14px rgba(0,212,255,.35);
  }
  #ciq-link svg { flex-shrink: 0; }

  /* ── Game selector ────────────────────────────────────────────────── */
  #game-selector-wrap {
    position: relative; z-index: 1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 0;
  }

  #game-selector-label {
    font-size: .7rem; color: var(--muted); letter-spacing: .12em;
    text-transform: uppercase; padding: 0 20px 8px;
  }

  #game-scroll {
    display: flex; gap: 8px;
    overflow-x: auto; padding: 0 20px 4px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    scroll-snap-type: x mandatory;
  }
  #game-scroll::-webkit-scrollbar { height: 4px; }
  #game-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .game-chip {
    flex-shrink: 0; scroll-snap-align: start;
    padding: 7px 16px; border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted); font-size: .8rem; font-weight: 600;
    letter-spacing: .04em; text-transform: uppercase;
    cursor: pointer; white-space: nowrap;
    transition: background .2s, border-color .2s, color .2s, box-shadow .2s;
  }
  .game-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 12px rgba(0,212,255,.25);
  }
  .game-chip.active {
    background: linear-gradient(135deg, rgba(0,212,255,.15), rgba(124,58,237,.15));
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 18px rgba(0,212,255,.3);
  }

  /* ── Main content ─────────────────────────────────────────────────── */
  main {
    position: relative; z-index: 1;
    max-width: 820px; margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* ── Section header ───────────────────────────────────────────────── */
  .section-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 1rem; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--accent);
  }
  .section-line { flex: 1; height: 1px; background: var(--border); }

  .update-tag {
    font-size: .72rem; color: var(--muted); letter-spacing: .04em;
  }

  /* ── Leaderboard table ────────────────────────────────────────────── */
  #lb-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .lb-row {
    display: grid;
    grid-template-columns: 52px 1fr auto;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    transition: background .15s;
    animation: fadeIn .4s ease both;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-row:hover { background: var(--surface2); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }

  .lb-row:nth-child(1) { animation-delay: .02s; }
  .lb-row:nth-child(2) { animation-delay: .05s; }
  .lb-row:nth-child(3) { animation-delay: .08s; }
  .lb-row:nth-child(4) { animation-delay: .11s; }
  .lb-row:nth-child(5) { animation-delay: .14s; }
  .lb-row:nth-child(6) { animation-delay: .17s; }
  .lb-row:nth-child(7) { animation-delay: .20s; }
  .lb-row:nth-child(8) { animation-delay: .23s; }
  .lb-row:nth-child(9) { animation-delay: .26s; }
  .lb-row:nth-child(10){ animation-delay: .29s; }

  /* top 3 highlight */
  .lb-row.rank-1 { background: linear-gradient(90deg, rgba(251,191,36,.07), transparent); }
  .lb-row.rank-2 { background: linear-gradient(90deg, rgba(148,163,184,.05), transparent); }
  .lb-row.rank-3 { background: linear-gradient(90deg, rgba(205,124,58,.06), transparent); }

  .lb-rank {
    font-size: 1.4rem; text-align: center;
    font-weight: 800;
  }
  .rank-1 .lb-rank { color: var(--gold); text-shadow: 0 0 12px rgba(251,191,36,.5); }
  .rank-2 .lb-rank { color: var(--silver); }
  .rank-3 .lb-rank { color: var(--bronze); }
  .lb-row:not(.rank-1):not(.rank-2):not(.rank-3) .lb-rank {
    font-size: .95rem; color: var(--muted); font-weight: 600;
  }

  .lb-user {
    font-weight: 600; font-size: .95rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .rank-1 .lb-user { color: #fff; }

  .lb-score {
    font-size: 1.05rem; font-weight: 800;
    letter-spacing: .04em; font-variant-numeric: tabular-nums;
    color: var(--accent);
    text-shadow: 0 0 10px rgba(0,212,255,.3);
  }
  .rank-1 .lb-score { color: var(--gold); text-shadow: 0 0 14px rgba(251,191,36,.5); }

  /* ── Empty / loading states ───────────────────────────────────────── */
  .state-msg {
    padding: 48px 20px; text-align: center;
    color: var(--muted); font-size: .9rem; letter-spacing: .04em;
  }
  .spinner {
    display: inline-block; width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Score bar decoration (top 10) ───────────────────────────────── */
  .lb-bar-wrap {
    margin-top: 4px; height: 3px;
    background: var(--border); border-radius: 2px; overflow: hidden;
    grid-column: 2 / 4;
  }
  .lb-bar {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .6s cubic-bezier(.4,0,.2,1);
  }

  /* ── Footer ───────────────────────────────────────────────────────── */
  footer {
    position: relative; z-index: 1;
    text-align: center; padding: 20px;
    font-size: .75rem; color: var(--muted); letter-spacing: .06em;
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* ── Responsive ───────────────────────────────────────────────────── */
  @media (max-width: 480px) {
    header { padding: 0 14px; }
    .lb-row { padding: 12px 14px; }
  }
</style>
</head>

  { id: 'sudoku',            label: 'Sudoku',             ciq: '7f2e1a5c8d3b4f6e9a1c2b4d6e8f0a2c' },
  { id: 'territory_clash',   label: 'Territory Clash',    ciq: '0d3e5814-d995-49d1-bfb0-c9e1e5028a92' },
  { id: 'tic_tac_pro',       label: 'Tic Tac Pro',        ciq: 'e5f6a7b8-c9d0-1234-efab-345678901234' },
  { id: 'twentyfortyeight',  label: '2048',               ciq: '4f6a8c0e2b4d6f8a0c2e4b6d8f0a2c4e' },
  { id: 'voidrocks',         label: 'Void Rocks',         ciq: 'e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1' },
];

const RANK_ICONS = ['🥇','🥈','🥉'];
const GAME_MAP   = Object.fromEntries(GAMES.map(g => [g.id, g]));

// ── State ───────────────────────────────────────────────────────────────────
let currentGame = null;
let fetchController = null;

// ── DOM refs ────────────────────────────────────────────────────────────────
const heroImg      = document.getElementById('hero-img');
const heroName     = document.getElementById('hero-game-name');
const ciqLink      = document.getElementById('ciq-link');
const lbWrap       = document.getElementById('lb-wrap');
const updateTag    = document.getElementById('update-tag');
const gameScroll   = document.getElementById('game-scroll');

// ── Build chip list ─────────────────────────────────────────────────────────
GAMES.forEach(g => {
  const btn = document.createElement('button');
  btn.className = 'game-chip';
  btn.textContent = g.label;
  btn.addEventListener('click', () => selectGame(g));
  btn.dataset.id = g.id;
  gameScroll.appendChild(btn);
});

// ── Select game ─────────────────────────────────────────────────────────────
function selectGame(g, pushState = true) {
  if (currentGame === g.id) return;
  currentGame = g.id;

  // Sync URL query param so the link is shareable/bookmarkable
  if (pushState) {
    const u = new URL(location.href);
    u.searchParams.set('game', g.id);
    history.pushState({ game: g.id }, '', u);
  }

  // Update chips
  document.querySelectorAll('.game-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.id === g.id);
  });

  // Hero image
  heroImg.classList.remove('loaded');
  const src = `${GITHUB_RAW}/${g.id}_hero.png`;
  heroImg.onload  = () => heroImg.classList.add('loaded');
  heroImg.onerror = () => { heroImg.src = ''; };
  heroImg.src = src;
  heroName.textContent = g.label.toUpperCase();

  // Connect IQ store link
  if (g.ciq) {
    ciqLink.href = CIQ_STORE + g.ciq;
    ciqLink.style.display = 'inline-flex';
  } else {
    ciqLink.style.display = 'none';
  }

  // Scroll chip into view
  const chip = document.querySelector(`.game-chip[data-id="${g.id}"]`);
  if (chip) chip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

  // Fetch leaderboard
  loadLeaderboard(g.id);
}

// ── Browser back/forward navigation ─────────────────────────────────────────
window.addEventListener('popstate', (e) => {
  const id = e.state?.game || new URL(location.href).searchParams.get('game');
  const g  = id && GAME_MAP[id];
  if (g) selectGame(g, false);
});

// ── Load leaderboard ────────────────────────────────────────────────────────
async function loadLeaderboard(game) {
  // Cancel any in-flight request
  if (fetchController) fetchController.abort();
  fetchController = new AbortController();

  updateTag.textContent = '';
  lbWrap.innerHTML = `
    <div class="state-msg">
      <div class="spinner"></div><br>Loading rankings…
    </div>`;

  try {
    const resp = await fetch(`${API_BASE}/leaderboard?game=${encodeURIComponent(game)}`,
      { signal: fetchController.signal, cache: 'no-store' });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    if (game !== currentGame) return; // stale response

    renderLeaderboard(data);
  } catch (e) {
    if (e.name === 'AbortError') return;
    if (game !== currentGame) return;
    lbWrap.innerHTML = `
      <div class="state-msg">
        ⚠️ Could not load rankings.<br>
        <small style="opacity:.6;font-size:.78rem">Check API_BASE in index.html</small>
      </div>`;
    updateTag.textContent = '';
  }
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderLeaderboard(data) {
  const rows = (data.top || []).slice(0, 10);
  if (!rows.length) {
    lbWrap.innerHTML = `<div class="state-msg">No scores yet — be the first!</div>`;
    updateTag.textContent = '';
    return;
  }

  const maxScore = rows[0].s || 1;
  const ts = data.updated ? new Date(data.updated * 1000) : null;
  if (ts) {
    updateTag.textContent = 'Updated ' + ts.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  }

  lbWrap.innerHTML = rows.map((row, i) => {
    const rank  = i + 1;
    const cls   = rank <= 3 ? `rank-${rank}` : '';
    const icon  = rank <= 3 ? RANK_ICONS[i] : rank;
    const pct   = Math.round((row.s / maxScore) * 100);
    const scoreFormatted = Number(row.s).toLocaleString();
    return `
      <div class="lb-row ${cls}" style="animation-delay:${.02 + i * .03}s">
        <div class="lb-rank">${icon}</div>
        <div class="lb-user">${escHtml(row.u || 'anon')}</div>
        <div class="lb-score">${scoreFormatted}</div>
      </div>`;
  }).join('');
}

// ── Utils ───────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Select game from URL param, or default to first game ────────────────────
const _initId = new URL(location.href).searchParams.get('game');
const _initGame = (_initId && GAME_MAP[_initId]) || GAMES[0];
selectGame(_initGame, !_initId);  // don't push state if already in URL
</script>
</body>
</html>
