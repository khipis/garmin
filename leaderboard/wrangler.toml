name = "garmin-leaderboard"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# ── D1 Database ───────────────────────────────────────────────────────────────
[[d1_databases]]
binding      = "DB"                          # env.DB in Worker code
database_name = "garmin-leaderboard"
database_id  = "REPLACE_WITH_YOUR_D1_ID"   # run: wrangler d1 create garmin-leaderboard

# ── Routes (optional — Workers.dev subdomain works out of the box) ────────────
# [env.production]
# routes = [{ pattern = "lb.yourdomain.com/*", zone_name = "yourdomain.com" }]
