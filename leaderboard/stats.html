<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bitochi — Admin Stats</title>
<style>
  :root {
    --bg:     #07111a;
    --card:   #0d1e2b;
    --card2:  #0a1a28;
    --border: #1a3040;
    --text:   #e2eaf0;
    --muted:  #5a7a90;
    --accent: #04d4ff;
    --green:  #22c55e;
    --amber:  #f59e0b;
    --purple: #7c3aed;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Header ─────────────────────────────────────────────────────────────── */
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 0 24px; height: 54px;
    background: var(--card); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-weight: 800; font-size: 1rem; }
  .badge {
    background: #1a2a10; border: 1px solid var(--amber);
    color: var(--amber); font-size: .63rem; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase;
    padding: 2px 8px; border-radius: 6px;
  }
  .spacer { flex: 1; }
  .hbtn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: .74rem;
  }
  .hbtn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Layout ─────────────────────────────────────────────────────────────── */
  .layout { display: flex; height: calc(100vh - 54px); }

  /* ── Sidebar ─────────────────────────────────────────────────────────────── */
  #sidebar {
    width: 220px; min-width: 220px; background: var(--card2);
    border-right: 1px solid var(--border);
    overflow-y: auto; display: flex; flex-direction: column;
  }
  .sb-section { padding: 10px 0 4px; }
  .sb-label {
    font-size: .58rem; text-transform: uppercase; letter-spacing: .1em;
    color: var(--muted); padding: 0 14px 6px;
  }
  .sb-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; cursor: pointer; font-size: .82rem;
    border-left: 2px solid transparent; transition: background .1s;
  }
  .sb-item:hover { background: #112030; }
  .sb-item.active { background: #112030; border-left-color: var(--accent); color: var(--accent); }
  .sb-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .sb-item.active .sb-dot { background: var(--accent); }
  .sb-cnt { margin-left: auto; font-size: .7rem; color: var(--muted); }

  /* ── Main panel ─────────────────────────────────────────────────────────── */
  #main { flex: 1; overflow-y: auto; padding: 22px 24px 48px; }

  /* ── Section heading ─────────────────────────────────────────────────────── */
  .sh { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .sh-title { font-size: .72rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); white-space: nowrap; }
  .sh-line  { flex: 1; height: 1px; background: var(--border); }
  .sh-tag   { font-size: .63rem; color: var(--muted); white-space: nowrap; }

  /* ── Stat cards ──────────────────────────────────────────────────────────── */
  .cards {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 10px; margin-bottom: 28px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px 12px; text-align: center;
  }
  .card .num {
    font-size: 1.75rem; font-weight: 800; line-height: 1.1;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .card .lbl { font-size: .63rem; color: var(--muted); margin-top: 6px;
               text-transform: uppercase; letter-spacing: .08em; }

  /* ── Tables ──────────────────────────────────────────────────────────────── */
  table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
  thead th {
    padding: 4px 10px 9px; text-align: left; font-size: .6rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: .08em;
  }
  thead th:not(:first-child) { text-align: right; }
  tbody tr { background: var(--card); border-bottom: 1px solid var(--border); }
  tbody tr:hover { background: #112030; }
  td { padding: 9px 10px; font-size: .83rem; }
  td:not(:first-child) { text-align: right; font-variant-numeric: tabular-nums; }
  td b { color: var(--accent); }
  .muted { color: var(--muted); font-size: .75rem; }
  .bar-cell { min-width: 100px; }
  .bar-wrap { background: var(--border); border-radius: 3px; height: 3px; margin-top: 5px; }
  .bar { height: 3px; border-radius: 3px;
         background: linear-gradient(90deg, var(--accent), var(--purple)); }
  .flag-name { display: flex; align-items: center; gap: 7px; }

  /* ── Game leaderboard panel ──────────────────────────────────────────────── */
  #lb-panel { display: none; }
  #lb-panel.visible { display: block; }

  .lb-game-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .lb-game-title { font-size: 1.1rem; font-weight: 800; }
  .lb-game-asc {
    font-size: .63rem; background: #1a2a10; border: 1px solid var(--green);
    color: var(--green); padding: 2px 7px; border-radius: 5px;
    text-transform: uppercase; letter-spacing: .06em;
  }
  .variant-tabs {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px;
  }
  .vtab {
    padding: 4px 11px; border-radius: 8px; font-size: .75rem; cursor: pointer;
    border: 1px solid var(--border); color: var(--muted); background: var(--card);
    transition: all .12s;
  }
  .vtab:hover { border-color: var(--accent); color: var(--accent); }
  .vtab.active { background: var(--accent); color: #04121a; border-color: var(--accent); font-weight: 700; }

  .lb-table-wrap { overflow-x: auto; }
  .lb-table { width: 100%; border-collapse: collapse; }
  .lb-table thead th {
    padding: 4px 10px 9px; text-align: left; font-size: .6rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: .08em;
  }
  .lb-table thead th:not(:first-child) { text-align: right; }
  .lb-table tbody tr { background: var(--card); border-bottom: 1px solid var(--border); }
  .lb-table tbody tr:hover { background: #112030; }
  .lb-table td { padding: 9px 10px; font-size: .83rem; }
  .lb-table td:not(:first-child) { text-align: right; font-variant-numeric: tabular-nums; }
  .rank-1 { color: #ffd700; font-weight: 800; }
  .rank-2 { color: #c0c0c0; font-weight: 700; }
  .rank-3 { color: #cd7f32; font-weight: 700; }

  /* ── States ─────────────────────────────────────────────────────────────── */
  .state { text-align: center; padding: 40px; color: var(--muted); font-size: .88rem; }
  .spinner {
    width: 26px; height: 26px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Error monitoring ────────────────────────────────────────────────────── */
  .err-summary {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;
  }
  .err-badge {
    background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
    border-radius: 8px; padding: 8px 14px; font-size: .78rem;
  }
  .err-badge .eb-game { font-weight: 700; color: #f87171; }
  .err-badge .eb-code { color: var(--muted); font-size: .7rem; margin-left: 4px; }
  .err-badge .eb-cnt  { font-weight: 800; font-size: 1rem; color: #fca5a5; }
  .err-none { color: var(--muted); font-size: .82rem; padding: 8px 0; }
  .err-table { width: 100%; border-collapse: collapse; font-size: .78rem; }
  .err-table th { text-align: left; padding: 6px 10px; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); }
  .err-table td { padding: 5px 10px; border-bottom: 1px solid rgba(255,255,255,.04); vertical-align: top; }
  .err-table tr:hover td { background: rgba(255,255,255,.02); }
  .err-code-400 { color: #fbbf24; font-weight: 700; }
  .err-code-429 { color: #a78bfa; font-weight: 700; }
  .err-code-500 { color: #f87171; font-weight: 700; }
  .err-time { color: var(--muted); white-space: nowrap; }
  .err-game { color: var(--accent); font-weight: 600; }
  .err-msg  { color: #8fa8bc; }

  /* ── Responsive ─────────────────────────────────────────────────────────── */
  @media (max-width: 640px) {
    .layout { flex-direction: column; height: auto; }
    #sidebar { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(--border); max-height: 200px; }
    .cards { grid-template-columns: repeat(2, 1fr); }
    .bar-cell { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">⌚ Bitochi</div>
  <div class="badge">Admin · Real Traffic Only</div>
  <div class="spacer"></div>
  <span id="updated-tag" style="font-size:.68rem;color:var(--muted);margin-right:8px"></span>
  <button class="hbtn" onclick="loadStats()">↺ Refresh stats</button>
</header>

<div class="layout">

  <!-- ── Sidebar: game list ────────────────────────────────────────────────── -->
  <nav id="sidebar">
    <div class="sb-section">
      <div class="sb-label">Views</div>
      <div class="sb-item active" id="nav-overview" onclick="showOverview()">
        <span class="sb-dot"></span> Overview
      </div>
    </div>
    <div class="sb-section">
      <div class="sb-label">Games</div>
      <div id="sb-games"><div style="padding:10px 14px;font-size:.75rem;color:var(--muted)">Loading…</div></div>
    </div>
  </nav>

  <!-- ── Main content ───────────────────────────────────────────────────────── -->
  <div id="main">

    <!-- Overview panel -->
    <div id="overview-panel">
      <div class="sh"><span class="sh-title">Totals — bots excluded</span><span class="sh-line"></span><span class="sh-tag" id="updated-inline"></span></div>
      <div class="cards" id="cards"><div class="card"><div class="spinner"></div></div></div>

      <div class="sh"><span class="sh-title">Per game</span><span class="sh-line"></span></div>
      <div id="per-game"><div class="state"><div class="spinner"></div>Loading…</div></div>

      <div class="sh"><span class="sh-title">Per country</span><span class="sh-line"></span></div>
      <div id="per-country"></div>

      <div class="sh"><span class="sh-title">🚨 Error monitoring — last 24 h</span><span class="sh-line"></span><button class="hbtn" onclick="loadErrors()" style="margin-left:8px;font-size:.7rem;padding:3px 8px">↺</button></div>
      <div id="error-summary"></div>
      <div class="sh"><span class="sh-title">Recent errors (last 100)</span><span class="sh-line"></span></div>
      <div id="error-log"><div class="state"><div class="spinner"></div>Loading…</div></div>
    </div>

    <!-- Leaderboard panel (per game) -->
    <div id="lb-panel">
      <div class="lb-game-header">
        <div class="lb-game-title" id="lb-game-title">—</div>
        <div class="lb-game-asc" id="lb-game-asc" style="display:none">lower is better</div>
      </div>
      <div class="variant-tabs" id="variant-tabs"></div>
      <div id="lb-content"><div class="state"><div class="spinner"></div>Loading…</div></div>
    </div>

  </div>
</div>

<script>
const API = 'https://api.bitochi.com';

function codeToFlag(cc) {
  if (!cc || cc.length !== 2) return '';
  const A = 0x1F1E6, base = 'A'.charCodeAt(0);
  cc = cc.toUpperCase();
  return String.fromCodePoint(A + cc.charCodeAt(0) - base, A + cc.charCodeAt(1) - base);
}
const COUNTRY_NAMES = {
  'AD':'Andorra','AE':'UAE','AF':'Afghanistan','AL':'Albania','AM':'Armenia',
  'AO':'Angola','AR':'Argentina','AT':'Austria','AU':'Australia','AZ':'Azerbaijan',
  'BA':'Bosnia','BD':'Bangladesh','BE':'Belgium','BG':'Bulgaria','BH':'Bahrain',
  'BO':'Bolivia','BR':'Brazil','BY':'Belarus','CA':'Canada','CH':'Switzerland',
  'CL':'Chile','CN':'China','CO':'Colombia','CR':'Costa Rica','CZ':'Czech Rep.',
  'DE':'Germany','DK':'Denmark','DZ':'Algeria','EC':'Ecuador','EE':'Estonia',
  'EG':'Egypt','ES':'Spain','ET':'Ethiopia','FI':'Finland','FR':'France',
  'GB':'UK','GE':'Georgia','GH':'Ghana','GR':'Greece','GT':'Guatemala',
  'HN':'Honduras','HR':'Croatia','HU':'Hungary','ID':'Indonesia','IE':'Ireland',
  'IL':'Israel','IN':'India','IQ':'Iraq','IR':'Iran','IS':'Iceland','IT':'Italy',
  'JM':'Jamaica','JO':'Jordan','JP':'Japan','KE':'Kenya','KG':'Kyrgyzstan',
  'KH':'Cambodia','KR':'S Korea','KW':'Kuwait','KZ':'Kazakhstan','LA':'Laos',
  'LB':'Lebanon','LT':'Lithuania','LU':'Luxembourg','LV':'Latvia','LY':'Libya',
  'MA':'Morocco','MD':'Moldova','ME':'Montenegro','MG':'Madagascar','MK':'N Macedonia',
  'ML':'Mali','MM':'Myanmar','MN':'Mongolia','MT':'Malta','MU':'Mauritius',
  'MX':'Mexico','MY':'Malaysia','MZ':'Mozambique','NA':'Namibia','NG':'Nigeria',
  'NL':'Netherlands','NO':'Norway','NP':'Nepal','NZ':'New Zealand','OM':'Oman',
  'PA':'Panama','PE':'Peru','PH':'Philippines','PK':'Pakistan','PL':'Poland',
  'PT':'Portugal','PY':'Paraguay','QA':'Qatar','RO':'Romania','RS':'Serbia',
  'RU':'Russia','RW':'Rwanda','SA':'Saudi Arabia','SE':'Sweden','SG':'Singapore',
  'SI':'Slovenia','SK':'Slovakia','SN':'Senegal','SO':'Somalia','SR':'Suriname',
  'SV':'El Salvador','SY':'Syria','TH':'Thailand','TJ':'Tajikistan','TN':'Tunisia',
  'TR':'Turkey','TT':'Trinidad','TZ':'Tanzania','UA':'Ukraine','UG':'Uganda',
  'US':'USA','UY':'Uruguay','UZ':'Uzbekistan','VE':'Venezuela','VN':'Vietnam',
  'YE':'Yemen','ZA':'S Africa','ZM':'Zambia','ZW':'Zimbabwe',
};

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── State ─────────────────────────────────────────────────────────────────────
let statsData   = null;
let currentGame = null;
let currentVariants = [];
let currentVariant  = '';

// ── Overview ──────────────────────────────────────────────────────────────────
function showOverview() {
  document.getElementById('overview-panel').style.display = '';
  document.getElementById('lb-panel').classList.remove('visible');
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-overview').classList.add('active');
  currentGame = null;
}

async function loadStats() {
  try {
    const r = await fetch(`${API}/stats?real=1`, { cache: 'no-store' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    statsData = await r.json();
    renderStats();
  } catch(e) {
    document.getElementById('per-game').innerHTML = `<div class="state">⚠️ ${esc(String(e))}</div>`;
  }
}

function renderStats() {
  const d = statsData;

  const ts = d.updated ? new Date(d.updated * 1000) : null;
  const tsStr = ts ? 'Updated ' + ts.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) : '';
  document.getElementById('updated-tag').textContent    = tsStr;
  document.getElementById('updated-inline').textContent = tsStr;

  const t = d.totals || {};
  document.getElementById('cards').innerHTML = `
    <div class="card"><div class="num">${(t.players||0).toLocaleString()}</div><div class="lbl">Unique Players</div><div class="lbl" style="font-size:.6rem;margin-top:2px;color:var(--muted)">named + anon-XXXX</div></div>
    <div class="card"><div class="num">${(t.devices||0).toLocaleString()}</div><div class="lbl">Unique IPs</div><div class="lbl" style="font-size:.6rem;margin-top:2px;color:var(--muted)">cross-check</div></div>
    <div class="card"><div class="num">${(t.scores||0).toLocaleString()}</div><div class="lbl">Real Scores</div></div>
    <div class="card"><div class="num">${(t.games||0).toLocaleString()}</div><div class="lbl">Games Active</div></div>`;

  // Per-game table + sidebar
  const rows = d.perGame || [];
  const maxP = Math.max(...rows.map(g => g.players||0), 1);

  // Sidebar
  const sbEl = document.getElementById('sb-games');
  sbEl.innerHTML = rows.map(g => `
    <div class="sb-item" id="sb-${g.game}" onclick="openGame('${esc(g.game)}')">
      <span class="sb-dot"></span>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(g.game)}</span>
      <span class="sb-cnt">${g.players||0}</span>
    </div>`).join('');

  // Main table
  if (!rows.length) {
    document.getElementById('per-game').innerHTML = '<div class="state">No real scores yet.</div>';
  } else {
    document.getElementById('per-game').innerHTML = `
      <table>
        <thead><tr><th>Game</th><th>Players</th><th>IPs</th><th>Scores</th><th class="bar-cell"></th></tr></thead>
        <tbody>${rows.map(g => {
          const pct = Math.round(((g.players||0)/maxP)*100);
          return `<tr style="cursor:pointer" onclick="openGame('${esc(g.game)}')">
            <td><b>${esc(g.game)}</b></td>
            <td><b>${(g.players||0).toLocaleString()}</b></td>
            <td class="muted">${(g.devices||0).toLocaleString()}</td>
            <td class="muted">${(g.scores||0).toLocaleString()}</td>
            <td class="bar-cell"><div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div></td>
          </tr>`;
        }).join('')}</tbody>
      </table>`;
  }

  // Per-country
  const ctrs = d.perCountry || [];
  if (ctrs.length) {
    const maxP2 = Math.max(...ctrs.map(c => c.players||0), 1);
    document.getElementById('per-country').innerHTML = `
      <table>
        <thead><tr><th>Country</th><th>Players</th><th>Scores</th><th class="bar-cell"></th></tr></thead>
        <tbody>${ctrs.map(c => {
          const code = c.country || '??';
          const flag = c.country ? codeToFlag(c.country) : '🌐';
          const name = COUNTRY_NAMES[code] || code;
          const pct  = Math.round(((c.players||0)/maxP2)*100);
          return `<tr>
            <td><span class="flag-name">${flag} ${esc(name)}</span></td>
            <td><b>${(c.players||0).toLocaleString()}</b></td>
            <td class="muted">${(c.scores||0).toLocaleString()}</td>
            <td class="bar-cell"><div class="bar-wrap"><div class="bar" style="width:${pct}%"></div></div></td>
          </tr>`;
        }).join('')}</tbody>
      </table>`;
  }
}

// ── Per-game leaderboard ───────────────────────────────────────────────────────
async function openGame(game) {
  currentGame    = game;
  currentVariant = '';
  currentVariants = [];

  // Switch panels + sidebar highlight
  document.getElementById('overview-panel').style.display = 'none';
  document.getElementById('lb-panel').classList.add('visible');
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  const sbItem = document.getElementById(`sb-${game}`);
  if (sbItem) sbItem.classList.add('active');
  document.getElementById('nav-overview').classList.remove('active');

  document.getElementById('lb-game-title').textContent = game;
  document.getElementById('lb-content').innerHTML = '<div class="state"><div class="spinner"></div>Loading…</div>';
  document.getElementById('variant-tabs').innerHTML = '';

  // Fetch variants
  try {
    const rv = await fetch(`${API}/variants?game=${encodeURIComponent(game)}&real=1`);
    if (rv.ok) {
      const vd = await rv.json();
      currentVariants = (vd.variants || []).filter(v => v !== '');
    }
  } catch {}

  // Render variant tabs
  const tabsEl = document.getElementById('variant-tabs');
  if (currentVariants.length > 0) {
    tabsEl.innerHTML = ['', ...currentVariants].map(v => `
      <button class="vtab${v===''?' active':''}" onclick="selectVariant('${esc(v)}')">${v==='' ? 'All / Default' : esc(v)}</button>
    `).join('');
  } else {
    tabsEl.innerHTML = '';
  }

  loadLb(game, '');
}

function selectVariant(v) {
  currentVariant = v;
  document.querySelectorAll('.vtab').forEach(el =>
    el.classList.toggle('active', el.textContent.trim() === (v === '' ? 'All / Default' : v)));
  loadLb(currentGame, v);
}

async function loadLb(game, variant) {
  const el = document.getElementById('lb-content');
  el.innerHTML = '<div class="state"><div class="spinner"></div>Loading…</div>';

  try {
    const url = `${API}/leaderboard?game=${encodeURIComponent(game)}&variant=${encodeURIComponent(variant)}&real=1`;
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();

    const ascEl = document.getElementById('lb-game-asc');
    ascEl.style.display = d.asc ? '' : 'none';

    const top = d.top || [];
    if (!top.length) {
      el.innerHTML = `<div class="state">No real scores for this game/variant yet.</div>`;
      return;
    }

    const rankIcon = r => r === 1 ? '🥇' : r === 2 ? '🥈' : r === 3 ? '🥉' : `#${r}`;
    const rankCls  = r => r === 1 ? 'rank-1' : r === 2 ? 'rank-2' : r === 3 ? 'rank-3' : '';

    el.innerHTML = `
      <div style="font-size:.7rem;color:var(--muted);margin-bottom:10px">
        ${(d.count||0).toLocaleString()} real player${d.count!==1?'s':''} · all-time
        ${d.asc ? '· lower is better' : '· higher is better'}
      </div>
      <div class="lb-table-wrap">
      <table class="lb-table">
        <thead><tr><th>Rank</th><th>Player</th><th>Country</th><th>Score</th></tr></thead>
        <tbody>${top.map(row => {
          const flag = row.c ? codeToFlag(row.c) : '';
          const cname = row.c ? (COUNTRY_NAMES[row.c] || row.c) : '—';
          return `<tr>
            <td class="${rankCls(row.r)}">${rankIcon(row.r)}</td>
            <td><b>${esc(row.u)}</b></td>
            <td><span style="gap:6px;display:flex;align-items:center">${flag} <span class="muted">${esc(cname)}</span></span></td>
            <td><b>${(row.s||0).toLocaleString()}</b></td>
          </tr>`;
        }).join('')}</tbody>
      </table>
      </div>`;
  } catch(e) {
    el.innerHTML = `<div class="state">⚠️ ${esc(String(e))}</div>`;
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadStats();
loadErrors();

async function loadErrors() {
  const summaryEl = document.getElementById('error-summary');
  const logEl     = document.getElementById('error-log');
  summaryEl.innerHTML = '<div class="state"><div class="spinner"></div></div>';
  logEl.innerHTML     = '<div class="state"><div class="spinner"></div>Loading…</div>';
  try {
    const r = await fetch(`${API}/errors?limit=100`, { cache: 'no-store' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();

    // ── Summary badges ────────────────────────────────────────────────────────
    const summary = d.summary || [];
    if (summary.length === 0) {
      summaryEl.innerHTML = '<div class="err-none">✅ No errors in the last 24 h</div>';
    } else {
      summaryEl.innerHTML = `<div class="err-summary">${
        summary.map(s => `
          <div class="err-badge">
            <span class="eb-game">${esc(s.game || '—')}</span>
            <span class="eb-code">[${s.error_code}]</span>
            <span class="eb-cnt"> ×${s.cnt}</span>
          </div>`).join('')
      }</div>`;
    }

    // ── Recent log table ──────────────────────────────────────────────────────
    const rows = d.recent || [];
    if (rows.length === 0) {
      logEl.innerHTML = '<div class="state">No errors recorded yet.</div>';
      return;
    }
    const codeClass = c => c >= 500 ? 'err-code-500' : c === 429 ? 'err-code-429' : 'err-code-400';
    logEl.innerHTML = `<div style="overflow-x:auto"><table class="err-table">
      <thead><tr>
        <th>Time</th><th>Code</th><th>Game</th><th>Message</th>
      </tr></thead>
      <tbody>${rows.map(r => {
        const dt = new Date(r.timestamp).toISOString().replace('T',' ').slice(0,19);
        return `<tr>
          <td class="err-time">${esc(dt)}</td>
          <td class="${codeClass(r.error_code)}">${r.error_code}</td>
          <td class="err-game">${esc(r.game || '—')}</td>
          <td class="err-msg">${esc(r.error_msg || '')}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  } catch(e) {
    summaryEl.innerHTML = '';
    logEl.innerHTML = `<div class="state">⚠️ ${esc(String(e))}</div>`;
  }
}
</script>
