name: Deploy Leaderboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "leaderboard/**"
      - "_LOGOS/**"

  workflow_dispatch:  # allow manual trigger

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Stage hero images (served from bitochi.com/heroes)
        run: |
          mkdir -p leaderboard/heroes
          cp _LOGOS/*_hero.png leaderboard/heroes/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: leaderboard   # serve the leaderboard/ folder

      - id: deploy
        uses: actions/deploy-pages@v4
