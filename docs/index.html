<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitochi Games — Global Leaderboard</title>
<style>
  /* ── Reset & tokens ───────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080c10;
    --surface:   #0e1520;
    --surface2:  #131d2a;
    --border:    #1e2d40;
    --text:      #d6e4f0;
    --muted:     #4a6278;
    --accent:    #00d4ff;
    --accent2:   #7c3aed;
    --gold:      #fbbf24;
    --silver:    #94a3b8;
    --bronze:    #cd7c3a;
    --green:     #22c55e;
    --radius:    12px;
    --shadow:    0 8px 32px rgba(0,0,0,.6);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── Grid background ──────────────────────────────────────────────── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  /* ── Header ───────────────────────────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,12,16,.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center; gap: 16px;
    height: 60px;
  }

  .logo {
    font-size: 1.1rem; font-weight: 800; letter-spacing: .08em;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    white-space: nowrap;
  }

  header .sep { flex: 1; }

  .live-dot {
    display: flex; align-items: center; gap: 6px;
    font-size: .75rem; color: var(--muted); letter-spacing: .05em;
    text-transform: uppercase;
  }
  .live-dot::before {
    content: ''; width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Hero banner ──────────────────────────────────────────────────── */
  #hero {
    position: relative; width: 100%; height: clamp(180px, 36vw, 380px);
    overflow: hidden;
    background: var(--surface);
  }

  #hero-img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center;
    transition: opacity .4s, transform .6s cubic-bezier(.4,0,.2,1);
    opacity: 0; transform: scale(1.03);
  }
  #hero-img.loaded { opacity: 1; transform: scale(1); }

  #hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(8,12,16,.9) 0%, transparent 60%);
    display: flex; flex-direction: column;
    justify-content: flex-end; padding: 24px 28px;
    pointer-events: none;
  }

  #hero-game-name {
    font-size: clamp(1.6rem, 5vw, 3rem);
    font-weight: 900; letter-spacing: .04em; text-transform: uppercase;
    text-shadow: 0 0 30px var(--accent);
    color: #fff;
    transition: opacity .3s;
  }

  #hero-tagline {
    font-size: .85rem; color: var(--accent); letter-spacing: .12em;
    text-transform: uppercase; margin-top: 4px;
  }

  /* ── Game selector ────────────────────────────────────────────────── */
  #game-selector-wrap {
    position: relative; z-index: 1;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 0;
  }

  #game-selector-label {
    font-size: .7rem; color: var(--muted); letter-spacing: .12em;
    text-transform: uppercase; padding: 0 20px 8px;
  }

  #game-scroll {
    display: flex; gap: 8px;
    overflow-x: auto; padding: 0 20px 4px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    scroll-snap-type: x mandatory;
  }
  #game-scroll::-webkit-scrollbar { height: 4px; }
  #game-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .game-chip {
    flex-shrink: 0; scroll-snap-align: start;
    padding: 7px 16px; border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted); font-size: .8rem; font-weight: 600;
    letter-spacing: .04em; text-transform: uppercase;
    cursor: pointer; white-space: nowrap;
    transition: background .2s, border-color .2s, color .2s, box-shadow .2s;
  }
  .game-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 12px rgba(0,212,255,.25);
  }
  .game-chip.active {
    background: linear-gradient(135deg, rgba(0,212,255,.15), rgba(124,58,237,.15));
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 18px rgba(0,212,255,.3);
  }

  /* ── Main content ─────────────────────────────────────────────────── */
  main {
    position: relative; z-index: 1;
    max-width: 820px; margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* ── Section header ───────────────────────────────────────────────── */
  .section-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 1rem; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--accent);
  }
  .section-line { flex: 1; height: 1px; background: var(--border); }

  .update-tag {
    font-size: .72rem; color: var(--muted); letter-spacing: .04em;
  }

  /* ── Leaderboard table ────────────────────────────────────────────── */
  #lb-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .lb-row {
    display: grid;
    grid-template-columns: 52px 1fr auto;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    transition: background .15s;
    animation: fadeIn .4s ease both;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-row:hover { background: var(--surface2); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }

  .lb-row:nth-child(1) { animation-delay: .02s; }
  .lb-row:nth-child(2) { animation-delay: .05s; }
  .lb-row:nth-child(3) { animation-delay: .08s; }
  .lb-row:nth-child(4) { animation-delay: .11s; }
  .lb-row:nth-child(5) { animation-delay: .14s; }
  .lb-row:nth-child(6) { animation-delay: .17s; }
  .lb-row:nth-child(7) { animation-delay: .20s; }
  .lb-row:nth-child(8) { animation-delay: .23s; }
  .lb-row:nth-child(9) { animation-delay: .26s; }
  .lb-row:nth-child(10){ animation-delay: .29s; }

  /* top 3 highlight */
  .lb-row.rank-1 { background: linear-gradient(90deg, rgba(251,191,36,.07), transparent); }
  .lb-row.rank-2 { background: linear-gradient(90deg, rgba(148,163,184,.05), transparent); }
  .lb-row.rank-3 { background: linear-gradient(90deg, rgba(205,124,58,.06), transparent); }

  .lb-rank {
    font-size: 1.4rem; text-align: center;
    font-weight: 800;
  }
  .rank-1 .lb-rank { color: var(--gold); text-shadow: 0 0 12px rgba(251,191,36,.5); }
  .rank-2 .lb-rank { color: var(--silver); }
  .rank-3 .lb-rank { color: var(--bronze); }
  .lb-row:not(.rank-1):not(.rank-2):not(.rank-3) .lb-rank {
    font-size: .95rem; color: var(--muted); font-weight: 600;
  }

  .lb-user {
    font-weight: 600; font-size: .95rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .rank-1 .lb-user { color: #fff; }

  .lb-score {
    font-size: 1.05rem; font-weight: 800;
    letter-spacing: .04em; font-variant-numeric: tabular-nums;
    color: var(--accent);
    text-shadow: 0 0 10px rgba(0,212,255,.3);
  }
  .rank-1 .lb-score { color: var(--gold); text-shadow: 0 0 14px rgba(251,191,36,.5); }

  /* ── Empty / loading states ───────────────────────────────────────── */
  .state-msg {
    padding: 48px 20px; text-align: center;
    color: var(--muted); font-size: .9rem; letter-spacing: .04em;
  }
  .spinner {
    display: inline-block; width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Score bar decoration (top 10) ───────────────────────────────── */
  .lb-bar-wrap {
    margin-top: 4px; height: 3px;
    background: var(--border); border-radius: 2px; overflow: hidden;
    grid-column: 2 / 4;
  }
  .lb-bar {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .6s cubic-bezier(.4,0,.2,1);
  }

  /* ── Footer ───────────────────────────────────────────────────────── */
  footer {
    position: relative; z-index: 1;
    text-align: center; padding: 20px;
    font-size: .75rem; color: var(--muted); letter-spacing: .06em;
    border-top: 1px solid var(--border);
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* ── Responsive ───────────────────────────────────────────────────── */
  @media (max-width: 480px) {
    header { padding: 0 14px; }
    .lb-row { padding: 12px 14px; }
  }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">⌚ Bitochi Games</div>
  <div class="sep"></div>
  <div class="live-dot">Live Rankings</div>
</header>

<!-- ── Hero banner ─────────────────────────────────────────────────────────── -->
<div id="hero">
  <img id="hero-img" src="" alt="" loading="eager">
  <div id="hero-overlay">
    <div id="hero-game-name">—</div>
    <div id="hero-tagline">Global Leaderboard · by Bitochi</div>
  </div>
</div>

<!-- ── Game selector ───────────────────────────────────────────────────────── -->
<div id="game-selector-wrap">
  <div id="game-selector-label">Select game</div>
  <div id="game-scroll"></div>
</div>

<!-- ── Leaderboard ─────────────────────────────────────────────────────────── -->
<main>
  <div class="section-header">
    <span class="section-title">Top 10</span>
    <span class="section-line"></span>
    <span class="update-tag" id="update-tag"></span>
  </div>
  <div id="lb-wrap">
    <div class="state-msg">← Select a game to view rankings</div>
  </div>
</main>

<footer>
  Powered by <a href="https://github.com/khipis/garmin" target="_blank">Bitochi Games</a>
  &nbsp;·&nbsp; Garmin Connect IQ
</footer>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
// Replace with your actual Cloudflare Worker URL after deploying:
const API_BASE = 'https://garmin-leaderboard.YOURSUBDOMAIN.workers.dev';

const GITHUB_RAW = 'https://raw.githubusercontent.com/khipis/garmin/main/_LOGOS';

const GAMES = [
  { id: '8ball',               label: '8 Ball' },
  { id: 'akari',               label: 'Akari' },
  { id: 'arcade',              label: 'Arcade' },
  { id: 'archery',             label: 'Archery' },
  { id: 'battleship',          label: 'Battleship' },
  { id: 'billiards',           label: 'Billiards' },
  { id: 'blackjack',           label: 'Blackjack' },
  { id: 'blobs',               label: 'Blobs' },
  { id: 'blocks',              label: 'Blocks' },
  { id: 'bomb',                label: 'Bomb' },
  { id: 'boxing',              label: 'Boxing' },
  { id: 'bricks',              label: 'Bricks' },
  { id: 'catapult',            label: 'Catapult' },
  { id: 'cellwars',            label: 'Cell Wars' },
  { id: 'checkers',            label: 'Checkers' },
  { id: 'chess',               label: 'Chess' },
  { id: 'chickencross',        label: 'Chicken Cross' },
  { id: 'connect_four_lite',   label: 'Connect Four' },
  { id: 'diceroyale',          label: 'Dice Royale' },
  { id: 'digcore',             label: 'Dig Core' },
  { id: 'dinosaur',            label: 'Dinosaur' },
  { id: 'dots_boxes',          label: 'Dots & Boxes' },
  { id: 'edgesurvivor',        label: 'Edge Survivor' },
  { id: 'fish',                label: 'Fish' },
  { id: 'flappypidgeon',       label: 'Flappy Pidgeon' },
  { id: 'gemmatch',            label: 'Gem Match' },
  { id: 'gobblet_mini',        label: 'Gobblet Mini' },
  { id: 'gravityminer',        label: 'Gravity Miner' },
  { id: 'gyromaze',            label: 'Gyro Maze' },
  { id: 'hangman',             label: 'Hangman' },
  { id: 'hex_mini',            label: 'Hex Mini' },
  { id: 'hologrid',            label: 'Hologrid' },
  { id: 'jazzball',            label: 'Jazzball' },
  { id: 'jumptower',           label: 'Jump Tower' },
  { id: 'kakuro',              label: 'Kakuro' },
  { id: 'lightsout',           label: 'Lights Out' },
  { id: 'makao_lite',          label: 'Makao' },
  { id: 'manpac',              label: 'Manpac' },
  { id: 'memo',                label: 'Memo' },
  { id: 'minesweeper',         label: 'Minesweeper' },
  { id: 'mini_go_9x9',         label: 'Mini Go' },
  { id: 'minigolf',            label: 'Minigolf' },
  { id: 'moon',                label: 'Moon' },
  { id: 'morris_classic',      label: 'Morris' },
  { id: 'mudrogue',            label: 'Mud Rogue' },
  { id: 'nonogram',            label: 'Nonogram' },
  { id: 'othello_blitz',       label: 'Othello Blitz' },
  { id: 'parachute',           label: 'Parachute' },
  { id: 'pinballpro',          label: 'Pinball Pro' },
  { id: 'pixelinvaders',       label: 'Pixel Invaders' },
  { id: 'poker',               label: 'Poker' },
  { id: 'pongpro',             label: 'Pong Pro' },
  { id: 'serpent',             label: 'Serpent' },
  { id: 'shadowclonerunner',   label: 'Shadow Clone Runner' },
  { id: 'skijump',             label: 'Ski Jump' },
  { id: 'skyroll',             label: 'Sky Roll' },
  { id: 'sniperscope',         label: 'Sniper Scope' },
  { id: 'solitare',            label: 'Solitaire' },
  { id: 'stacktower',          label: 'Stack Tower' },
  { id: 'starcombat',          label: 'Star Combat' },
  { id: 'starswarm',           label: 'Star Swarm' },
  { id: 'sudoku',              label: 'Sudoku' },
  { id: 'territory_clash',     label: 'Territory Clash' },
  { id: 'tic_tac_pro',         label: 'Tic Tac Pro' },
  { id: 'twentyfortyeight',    label: '2048' },
  { id: 'voidrocks',           label: 'Void Rocks' },
];

const RANK_ICONS = ['🥇','🥈','🥉'];

// ── State ───────────────────────────────────────────────────────────────────
let currentGame = null;
let fetchController = null;

// ── DOM refs ────────────────────────────────────────────────────────────────
const heroImg      = document.getElementById('hero-img');
const heroName     = document.getElementById('hero-game-name');
const lbWrap       = document.getElementById('lb-wrap');
const updateTag    = document.getElementById('update-tag');
const gameScroll   = document.getElementById('game-scroll');

// ── Build chip list ─────────────────────────────────────────────────────────
GAMES.forEach(g => {
  const btn = document.createElement('button');
  btn.className = 'game-chip';
  btn.textContent = g.label;
  btn.addEventListener('click', () => selectGame(g));
  btn.dataset.id = g.id;
  gameScroll.appendChild(btn);
});

// ── Select game ─────────────────────────────────────────────────────────────
function selectGame(g) {
  if (currentGame === g.id) return;
  currentGame = g.id;

  // Update chips
  document.querySelectorAll('.game-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.id === g.id);
  });

  // Hero image
  heroImg.classList.remove('loaded');
  const src = `${GITHUB_RAW}/${g.id}_hero.png`;
  heroImg.onload  = () => heroImg.classList.add('loaded');
  heroImg.onerror = () => { heroImg.src = ''; };
  heroImg.src = src;
  heroName.textContent = g.label.toUpperCase();

  // Scroll chip into view
  const chip = document.querySelector(`.game-chip[data-id="${g.id}"]`);
  if (chip) chip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

  // Fetch leaderboard
  loadLeaderboard(g.id);
}

// ── Load leaderboard ────────────────────────────────────────────────────────
async function loadLeaderboard(game) {
  // Cancel any in-flight request
  if (fetchController) fetchController.abort();
  fetchController = new AbortController();

  updateTag.textContent = '';
  lbWrap.innerHTML = `
    <div class="state-msg">
      <div class="spinner"></div><br>Loading rankings…
    </div>`;

  try {
    const resp = await fetch(`${API_BASE}/leaderboard?game=${encodeURIComponent(game)}`,
      { signal: fetchController.signal, cache: 'no-store' });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    if (game !== currentGame) return; // stale response

    renderLeaderboard(data);
  } catch (e) {
    if (e.name === 'AbortError') return;
    if (game !== currentGame) return;
    lbWrap.innerHTML = `
      <div class="state-msg">
        ⚠️ Could not load rankings.<br>
        <small style="opacity:.6;font-size:.78rem">Check API_BASE in index.html</small>
      </div>`;
    updateTag.textContent = '';
  }
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderLeaderboard(data) {
  const rows = (data.top || []).slice(0, 10);
  if (!rows.length) {
    lbWrap.innerHTML = `<div class="state-msg">No scores yet — be the first!</div>`;
    updateTag.textContent = '';
    return;
  }

  const maxScore = rows[0].s || 1;
  const ts = data.updated ? new Date(data.updated * 1000) : null;
  if (ts) {
    updateTag.textContent = 'Updated ' + ts.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  }

  lbWrap.innerHTML = rows.map((row, i) => {
    const rank  = i + 1;
    const cls   = rank <= 3 ? `rank-${rank}` : '';
    const icon  = rank <= 3 ? RANK_ICONS[i] : rank;
    const pct   = Math.round((row.s / maxScore) * 100);
    const scoreFormatted = Number(row.s).toLocaleString();
    return `
      <div class="lb-row ${cls}" style="animation-delay:${.02 + i * .03}s">
        <div class="lb-rank">${icon}</div>
        <div class="lb-user">${escHtml(row.u || 'anon')}</div>
        <div class="lb-score">${scoreFormatted}</div>
      </div>`;
  }).join('');
}

// ── Utils ───────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Auto-select first game on load ──────────────────────────────────────────
selectGame(GAMES[0]);
</script>
</body>
</html>
